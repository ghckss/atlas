services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hermes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes
    ports:
      - "5432:5432"
    volumes:
      - hermes_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hermes_postgres_data:
